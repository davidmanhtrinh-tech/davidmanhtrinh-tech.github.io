<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio/Video Media Player</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <h1>Learning to play audio on web</h1>
    <audio src="airport.mp3" controls id="airport-audio"></audio>
    <audio src="pop.mp3" id="pop-audio"></audio>
    <button id="play-button">Play audio</button>
    <button id="pause-button">Pause audio</button>
    <button id="pop-button">Pop audio</button>
    <video src="stardust.mp4" controls id="my-video"></video>
    <button id="play-pause-buttonn" onclick="togglePlayPause()">
      <img
        id="play-pause-img"
        src="https://img.icons8.com/ios-glyphs/30/play--v1.png"
        alt="Play Button"
        width="24"
        height="24"
      />
    </button>
  </body>
</html>
