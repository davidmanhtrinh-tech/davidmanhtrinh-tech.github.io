<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>2much_tech - 3D Cards</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css"
    />
    <link rel="stylesheet" href="./card.css" />
  </head>

  <body>
    <div class="centered">
      <div class="card border-left-behind">
        <div class="shadow" style="--url: url(&quot;tiger.png&quot;)"></div>
        <div
          class="image background"
          style="--url: url(&quot;fox.png&quot;)"
        ></div>
        <div
          class="image cutout"
          style="--url: url(&quot;eagle.png&quot;)"
        ></div>
        <div class="content">
          <h2>Bald Eagle</h2>
          <p>Fierce bald eagle</p>
        </div>
      </div>

      <div class="card border-right-behind border-bottom-behind">
        <div class="shadow" style="--url: url(&quot;tiger.png&quot;)"></div>
        <div
          class="image background"
          style="--url: url(&quot;eagle.png&quot;)"
        ></div>
        <div class="image cutout" style="--url: url(&quot;fox.png&quot;)"></div>
        <div class="content">
          <h2>Red Fox</h2>
          <p>This is the red fox</p>
        </div>
      </div>
    </div>
  </body>
</html>
