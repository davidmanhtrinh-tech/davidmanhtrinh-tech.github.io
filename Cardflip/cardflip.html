<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Onn flip</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
      }

      .flip-card {
        width: 300px;
        height: 420px;
        perspective: 1000px;
      }

      .flip-card-inner {
        position: relative;
        width: 100%;
        height: 100%;
        transition: transform 0.8s;
        transform-style: preserve-3d;
      }

      .flip-card:hover .flip-card-inner {
        transform: rotateY(180deg);
      }

      .flip-card-front,
      .flip-card-back {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
        border-radius: 16px;
        overflow: hidden;
      }

      .flip-card-front {
        background: #ff1313;
      }

      .flip-card-front img,
      .flip-card-back img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .flip-card-back {
        background: #ff4545;
        color: white;
        transform: rotateY(180deg);
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
      }

      .flip-card-back h3,
      .flip-card-back h1 {
        position: absolute;
        left: 20px;
        margin: 0;
        z-index: 2;
      }

      .flip-card-back h3 {
        bottom: 60px;
        font-size: 18px;
      }

      .flip-card-back h1 {
        bottom: 20px;
        font-size: 36px;
      }
    </style>
  </head>
  <body>
    <div class="flip-card">
      <div class="flip-card-inner">
        <div class="flip-card-front">
          <img src="Blue Onn.png" alt="Blue Onn" />
          <h3>This is Onn</h3>
          <h1>Onn</h1>
        </div>

        <div class="flip-card-back">
          <img src="Red Onn.png" alt="Red Onn" />
          <h3>This is Onn</h3>
          <h1>Onn</h1>
        </div>
      </div>
    </div>
  </body>
</html>
